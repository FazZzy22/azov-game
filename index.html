<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-orange: #ff8c00; --glow-orange: rgba(255, 140, 0, 0.6); }
        
        body { 
            background: radial-gradient(circle at center, #1a0f00 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; margin: 0; padding: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Анимированные частицы (искры) */
        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: var(--main-orange); border-radius: 50%; animation: particleFall 4s linear infinite; filter: blur(1px); }
        @keyframes particleFall { 0% { transform: translateY(-10px) scale(1); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(100vh) scale(0.5); opacity: 0; } }

        /* Стеклянная шапка */
        .user-header { 
            display: flex; align-items: center; justify-content: center; padding: 12px; 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 140, 0, 0.2); z-index: 10; 
        }
        #user-photo { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--main-orange); margin-right: 12px; box-shadow: 0 0 10px var(--glow-orange); }
        #user-name { font-weight: 800; color: var(--main-orange); font-size: 13px; letter-spacing: 1.5px; }

        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; }
        
        /* Ранг с неоновой полоской */
        .rank-box { margin-bottom: 20px; }
        .rank-name { color: var(--main-orange); font-weight: 900; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--glow-orange); }
        .progress-container { width: 240px; height: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; margin: 10px auto; border: 1px solid rgba(255,140,0,0.3); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ff4500, #ff8c00); width: 0%; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 20px var(--main-orange); }

        /* Счет в стиле киберпанк */
        .score-box { 
            background: rgba(255, 140, 0, 0.05); border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 24px; padding: 20px 50px; backdrop-filter: blur(5px);
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.1);
        }
        .score { font-size: 48px; font-weight: 900; color: var(--main-orange); text-shadow: 0 0 20px var(--glow-orange); }
        
        /* ЯКОРЬ (Раскаленный металл) */
        .click-area { 
            font-size: 140px; cursor: pointer; transition: all 0.1s; 
            margin: 30px 0; filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.2));
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.2)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(255, 140, 0, 0.5)); } }
        .click-area:active { transform: scale(0.9) rotate(-5deg); filter: brightness(1.5) drop-shadow(0 0 50px var(--main-orange)); }

        .floating-text { position: absolute; color: #fff; font-weight: 900; font-size: 28px; pointer-events: none; animation: floatUp 1s ease-out forwards; text-shadow: 0 0 15px var(--main-orange); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }

        /* Кнопки */
        .btn-box { padding: 25px; display: flex; gap: 12px; z-index: 20; }
        .btn { 
            flex: 1; background: linear-gradient(135deg, #ff8c00, #ff4500); color: #000; 
            border: none; padding: 18px; border-radius: 16px; font-weight: 900; 
            font-size: 15px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        .share-btn { background: rgba(255,255,255,0.05); color: var(--main-orange); border: 1px solid var(--main-orange); }

        /* Магазин V4 (Дизайнерский) */
        #shop-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 100; 
        }
        .multiplier-btn { 
            background: rgba(255,255,255,0.05); color: var(--main-orange); border: 1px solid rgba(255,140,0,0.3); 
            padding: 10px 25px; border-radius: 12px; font-weight: bold; margin: 20px 5px;
        }
        .multiplier-btn.active { background: var(--main-orange); color: #000; box-shadow: 0 0 20px var(--glow-orange); }
        
        .shop-item { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            margin: 12px 20px; padding: 18px; border-radius: 18px; display: flex; 
            justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .shop-item:hover { background: rgba(255,140,0,0.05); border-color: var(--main-orange); }
        .buy-btn { 
            background: var(--main-orange); border: none; padding: 12px 18px; 
            border-radius: 10px; font-weight: 900; color: #000; 
        }
        .buy-btn:disabled { background: #222; color: #555; }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div class="user-header">
        <img id="user-photo" src="" alt="" style="display:none">
        <div id="user-name">СТАЛЬНОЙ МАГНАТ</div>
    </div>

    <div class="main-screen">
        <div class="rank-box">
            <div class="rank-name" id="rank">Разнорабочий</div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        <div class="score-box">
            <div class="score"><span id="score">0</span> т.</div>
            <div style="font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 2px;">AZOV STEEL RESERVES</div>
        </div>
        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color:var(--main-orange); font-weight:800; letter-spacing: 1px;">КЛИК: +1 | АВТО: 0/СЕК</div>
    </div>

    <div class="btn-box">
        <button class="btn share-btn" onclick="shareResult()">📢</button>
        <button class="btn" onclick="openShop()">🏢 ЗАВОДСКОЙ МАГАЗИН</button>
    </div>

    <div id="shop-modal">
        <h2 style="color: var(--main-orange); margin-top: 50px; letter-spacing: 3px;">UPGRADES</h2>
        <div style="display: flex; justify-content: center; margin-bottom: 10px;">
            <button class="multiplier-btn active" id="m1" onclick="setMultiplier(1)">X1</button>
            <button class="multiplier-btn" id="m10" onclick="setMultiplier(10)">X10</button>
            <button class="multiplier-btn" id="mMax" onclick="setMultiplier('MAX')">MAX</button>
        </div>
        <div id="shop-list"></div>
        <div style="padding: 40px; color: var(--main-orange); font-weight: 900; cursor: pointer; text-decoration: underline;" onclick="closeShop()">CLOSE</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#1a0f00";

        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;
        let buyMultiplier = 1;

        const upgrades = [
            { id: 'click', name: 'МОЛОТ V2', price: 50 },
            { id: 'auto', name: 'ЦЕХ АВТОМАТИКИ', price: 200 },
            { id: 'furnace', name: 'МАРТЕНОВСКАЯ ПЕЧЬ', price: 2000 },
            { id: 'port', name: 'МОРСКОЙ ПОРТ', price: 10000 }
        ];

        const ranks = [
            { name: "Разнорабочий", goal: 500 },
            { name: "Мастер смены", goal: 2000 },
            { name: "Начальник цеха", goal: 10000 },
            { name: "Директор завода", goal: 50000 },
            { name: "Хозяин Азовстали", goal: 1000000 }
        ];

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('stats').innerText = `КЛИК: +${clickPower} | АВТО: ${autoPower}/СЕК`;
            
            let currentRankIndex = ranks.findIndex(r => score < r.goal);
            if (currentRankIndex === -1) currentRankIndex = ranks.length - 1;
            let currentRank = ranks[currentRankIndex];
            let prevGoal = ranks[currentRankIndex - 1]?.goal || 0;
            let prog = ((score - prevGoal) / (currentRank.goal - prevGoal)) * 100;
            document.getElementById('rank').innerText = currentRank.name;
            document.getElementById('progressBar').style.width = Math.min(prog, 100) + "%";

            if (document.getElementById('shop-modal').style.display === 'block') renderShop();

            localStorage.setItem('steel_score', score);
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
        }

        function setMultiplier(m) {
            buyMultiplier = m;
            document.querySelectorAll('.multiplier-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('m' + (m === 'MAX' ? 'Max' : m)).classList.add('active');
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            upgrades.forEach(up => {
                let count = buyMultiplier === 'MAX' ? Math.max(1, Math.floor(score / up.price)) : buyMultiplier;
                let totalPrice = up.price * count;
                list.innerHTML += `
                    <div class="shop-item">
                        <div style="text-align:left"><b>${up.name}</b><br><small style="color:#aaa">КУПИТЬ: ${count} ШТ.</small></div>
                        <button class="buy-btn" ${score >= totalPrice ? '' : 'disabled'} onclick="buyUpgrade('${up.id}', ${count}, ${totalPrice})">
                            ${totalPrice.toLocaleString()} Т.
                        </button>
                    </div>`;
            });
        }

        function buyUpgrade(id, count, price) {
            if (score >= price) {
                score -= price;
                if (id === 'click') clickPower += count;
                else autoPower += (id === 'auto' ? 1 : id === 'furnace' ? 10 : 50) * count;
                tg.HapticFeedback.notificationOccurred('success');
                updateDisplay();
            }
        }

        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            score += clickPower;
            const ft = document.createElement('div');
            ft.className = 'floating-text';
            ft.innerText = `+${clickPower}`;
            ft.style.left = e.touches[0].clientX - 20 + 'px';
            ft.style.top = e.touches[0].clientY - 40 + 'px';
            document.body.appendChild(ft);
            setTimeout(() => ft.remove(), 1000);
            updateDisplay();
            tg.HapticFeedback.impactOccurred('heavy');
        });

        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 4 + 2 + 'px'; p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(p);
            }
        }

        setInterval(() => { if (autoPower > 0) { score += autoPower; updateDisplay(); } }, 1000);
        function openShop() { document.getElementById('shop-modal').style.display = 'block'; renderShop(); }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }
        
        try {
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById('user-name').innerText = (u.first_name || u.username).toUpperCase();
                if (u.photo_url) { const img = document.getElementById('user-photo'); img.src = u.photo_url; img.style.display = 'block'; }
            }
        } catch (e) {}

        createParticles();
        updateDisplay();
    </script>
</body>
</html>
