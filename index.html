<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; }
        .score-box { border: 2px solid #ff8c00; border-radius: 20px; display: inline-block; padding: 15px 40px; margin-bottom: 40px; background: rgba(255,140,0,0.1); }
        .score { font-size: 42px; font-weight: bold; color: #ff8c00; }
        
        /* Кнопка-якорь, которая точно отобразится везде */
        .click-area { font-size: 150px; cursor: pointer; transition: transform 0.05s; display: block; margin: 0 auto; width: 200px; height: 200px; line-height: 200px; text-shadow: 0 0 30px rgba(255, 140, 0, 0.5); }
        .click-area:active { transform: scale(0.9); }
        
        .status { margin-top: 30px; font-size: 16px; font-weight: bold; color: #ff8c00; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="score-box">
            <div class="score"><span id="score">0</span> т.</div>
            <div style="font-size: 14px; color: #aaa;">СТАЛЬ ДОБЫТА</div>
        </div>
        
        <div class="click-area" id="clickBtn">⚓</div>
        
        <div class="status">АЗОВСКИЙ ЦЕХ №1</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        let score = parseInt(localStorage.getItem('steel_score')) || 0;
        let scoreElement = document.getElementById('score');
        scoreElement.innerText = score;

        document.getElementById('clickBtn').addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;
            localStorage.setItem('steel_score', score);
            
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
