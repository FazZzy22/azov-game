<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon: Overdrive</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-orange: #ff8c00; --heat-blue: #00d4ff; }
        body { 
            background: radial-gradient(circle at center, #1a0f00 0%, #000 100%);
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: var(--main-orange); border-radius: 50%; animation: particleFall 4s linear infinite; opacity: 0.3; }
        @keyframes particleFall { 0% { transform: translateY(-10px); opacity: 0; } 100% { transform: translateY(100vh); opacity: 0; } }

        /* Квест дня */
        .quest-banner { background: rgba(255,140,0,0.1); border: 1px dashed var(--main-orange); margin: 10px; padding: 8px; border-radius: 10px; font-size: 11px; z-index: 10; }

        .user-header { display: flex; align-items: center; justify-content: center; padding: 10px; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,140,0,0.2); z-index: 10; }
        #user-photo { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--main-orange); margin-right: 10px; display:none; }
        #user-name { font-weight: 800; color: var(--main-orange); font-size: 12px; letter-spacing: 1px; }

        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; }
        
        /* Ранг */
        .rank-name { color: var(--main-orange); font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .progress-container { width: 200px; height: 6px; background: #222; border-radius: 10px; margin: 5px 0 20px; overflow: hidden; border: 1px solid #333; }
        .progress-bar { height: 100%; background: var(--main-orange); width: 0%; transition: width 0.4s; box-shadow: 0 0 15px var(--main-orange); }

        .score-box { background: rgba(255,140,0,0.05); border: 1px solid rgba(255,140,0,0.2); border-radius: 20px; padding: 15px 40px; margin-bottom: 15px; }
        .score { font-size: 44px; font-weight: 900; color: var(--main-orange); text-shadow: 0 0 20px rgba(255,140,0,0.3); }

        /* ЯКОРЬ и Перегрев */
        .click-area { font-size: 130px; cursor: pointer; transition: 0.1s; margin: 15px 0; position: relative; }
        .click-area.overdrive { filter: drop-shadow(0 0 40px var(--heat-blue)) hue-rotate(180deg); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }

        /* Кнопка Риска */
        .gamble-btn { background: #ff4500; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 12px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 0 15px rgba(255,69,0,0.4); }

        .floating-text { position: absolute; font-weight: 900; pointer-events: none; animation: floatUp 0.8s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }

        .btn-box { padding: 20px; display: flex; gap: 10px; z-index: 20; }
        .btn { flex: 1; background: var(--main-orange); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; text-transform: uppercase; }
        .shop-btn { background: #fff; }

        /* Магазин */
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding-top: 40px; }
        .multiplier-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .m-btn { background: #222; color: #ff8c00; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; }
        .m-btn.active { background: var(--main-orange); color: #000; }
        .shop-item { background: #111; margin: 10px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    
    <div class="quest-banner" id="quest">Квест: Добыть 100 т. сегодня (0/100)</div>

    <div class="user-header">
        <img id="user-photo" src="" alt="">
        <div id="user-name">ГЕНЕРАЛЬНЫЙ ДИРЕКТОР</div>
    </div>

    <div class="main-screen">
        <div class="rank-name" id="rank">Разнорабочий</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

        <button class="gamble-btn" onclick="gamble()">🎲 РИСКНУТЬ (10%)</button>

        <div class="score-box">
            <div class="score" id="score">0</div>
            <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">ТОНН СТАЛИ</div>
        </div>

        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color:var(--main-orange); font-weight:800; font-size:12px;">КЛИК: +1 | АВТО: 0/СЕК</div>
    </div>

    <div class="btn-box">
        <button class="btn" style="flex:0.3; background:#222; color:#ff8c00;" onclick="share()">📢</button>
        <button class="btn" onclick="openShop()">🏢 УЛУЧШИТЬ ЗАВОД</button>
    </div>

    <div id="shop-modal">
        <h2 style="color:var(--main-orange)">ЦЕХ МОДЕРНИЗАЦИИ</h2>
        <div class="multiplier-row">
            <button class="m-btn active" id="m1" onclick="setM(1)">X1</button>
            <button class="m-btn" id="m10" onclick="setM(10)">X10</button>
            <button class="m-btn" id="mMax" onclick="setM('MAX')">MAX</button>
        </div>
        <div id="shop-list"></div>
        <p onclick="closeShop()" style="color:var(--main-orange); margin-top:30px; font-weight:900;">← НАЗАД К ПЕЧИ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;
        let buyM = 1;

        // Перегрев (Overdrive)
        let clickTimes = [];
        let isOverdrive = false;

        // Квест
        let dailyGoal = 5000;
        let dailyCurrent = 0;

        const upgrades = [
            { id: 'click', name: 'МОЛОТ V2', price: 50, power: 1 },
            { id: 'auto', name: 'АВТО-ЛИНИЯ', price: 200, power: 1 },
            { id: 'furnace', name: 'ПЕЧЬ МАРТЕН', price: 2000, power: 10 },
            { id: 'port', name: 'ПОРТ АЗОВА', price: 10000, power: 50 }
        ];

        function update() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('stats').innerText = `КЛИК: +${isOverdrive ? clickPower*2 : clickPower} | АВТО: ${autoPower}/СЕК`;
            
            // Ранги
            const ranks = [500, 2000, 10000, 50000, 1000000];
            const names = ["Разнорабочий", "Мастер", "Начальник", "Директор", "Владелец"];
            let idx = ranks.findIndex(r => score < r);
            if (idx === -1) idx = 4;
            document.getElementById('rank').innerText = names[idx];
            let prev = idx === 0 ? 0 : ranks[idx-1];
            let prog = ((score - prev) / (ranks[idx] - prev)) * 100;
            document.getElementById('progressBar').style.width = Math.min(prog, 100) + "%";

            // Квест
            document.getElementById('quest').innerText = `Квест: Накликать 5000 т. (${Math.floor(dailyCurrent)}/5000)`;
            if (dailyCurrent >= dailyGoal) {
                score += 1000;
                dailyCurrent = 0;
                tg.showAlert("Квест выполнен! Бонус +1000 тонн!");
            }

            localStorage.setItem('steel_score', score);
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
        }

        // Клик
        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            const now = Date.now();
            clickTimes.push(now);
            clickTimes = clickTimes.filter(t => now - t < 1000);

            // Активация перегрева (больше 6 кликов в сек)
            if (clickTimes.length > 6) {
                if (!isOverdrive) {
                    isOverdrive = true;
                    document.getElementById('clickBtn').classList.add('overdrive');
                }
            } else {
                isOverdrive = false;
                document.getElementById('clickBtn').classList.remove('overdrive');
            }

            let gain = isOverdrive ? clickPower * 2 : clickPower;
            score += gain;
            dailyCurrent += gain;

            // Эффект
            const ft = document.createElement('div');
            ft.className = 'floating-text';
            ft.innerText = `+${gain}`;
            ft.style.color = isOverdrive ? 'var(--heat-blue)' : 'var(--main-orange)';
            ft.style.left = e.touches[0].clientX + 'px';
            ft.style.top = e.touches[0].clientY + 'px';
            document.body.appendChild(ft);
            setTimeout(() => ft.remove(), 800);

            tg.HapticFeedback.impactOccurred(isOverdrive ? 'heavy' : 'medium');
            update();
        });

        // Азартная игра
        function gamble() {
            let bet = score * 0.1;
            if (score < 100) return tg.showAlert("Слишком мало стали для риска!");
            
            tg.showConfirm("Рискнуть " + Math.floor(bet) + " т. стали? (Шанс 40% на x3)", (ok) => {
                if (ok) {
                    if (Math.random() < 0.4) {
                        score += bet * 2;
                        tg.HapticFeedback.notificationOccurred('success');
                        tg.showAlert("ПОБЕДА! + " + Math.floor(bet*3) + " тонн!");
                    } else {
                        score -= bet;
                        tg.HapticFeedback.notificationOccurred('error');
                        tg.showAlert("ПРОИГРЫШ. Печь остыла...");
                    }
                    update();
                }
            });
        }

        // Магазин
        function setM(m) { buyM = m; renderShop(); }
        function openShop() { document.getElementById('shop-modal').style.display='block'; renderShop(); }
        function closeShop() { document.getElementById('shop-modal').style.display='none'; }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            upgrades.forEach(up => {
                let count = buyM === 'MAX' ? Math.max(1, Math.floor(score / up.price)) : buyM;
                let cost = up.price * count;
                list.innerHTML += `<div class="shop-item">
                    <div style="text-align:left"><b>${up.name}</b><br><small>+${up.power * count} к добыче</small></div>
                    <button class="m-btn" ${score < cost ? 'disabled' : ''} onclick="buy('${up.id}', ${count}, ${cost})">${cost} Т.</button>
                </div>`;
            });
        }

        function buy(id, count, cost) {
            if (score >= cost) {
                score -= cost;
                let up = upgrades.find(u => u.id === id);
                if (id === 'click') clickPower += count;
                else autoPower += up.power * count;
                tg.HapticFeedback.notificationOccurred('success');
                update();
                renderShop();
            }
        }

        // Авто-добыча
        setInterval(() => { if (autoPower > 0) { score += autoPower; update(); } }, 1000);

        // Старт
        update();
        for(let i=0; i<15; i++) {
            let p = document.createElement('div'); p.className='particle';
            p.style.left=Math.random()*100+'vw'; p.style.width=Math.random()*3+'px';
            p.style.height=p.style.width; p.style.animationDelay=Math.random()*4+'s';
            document.getElementById('particles-container').appendChild(p);
        }

        try {
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById('user-name').innerText = (u.first_name || u.username).toUpperCase();
            }
        } catch(e) {}
    </script>
</body>
</html>
