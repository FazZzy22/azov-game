<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon: Inflation</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стиль оставляем прежним для атмосферы */
        :root { --main-orange: #ff8c00; --heat-blue: #00d4ff; }
        body { background: radial-gradient(circle at center, #1a0f00 0%, #000 100%); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: var(--main-orange); border-radius: 50%; animation: particleFall 4s linear infinite; opacity: 0.3; }
        @keyframes particleFall { 0% { transform: translateY(-10px); opacity: 0; } 100% { transform: translateY(100vh); opacity: 0; } }
        .quest-banner { background: rgba(255,140,0,0.1); border: 1px dashed var(--main-orange); margin: 10px; padding: 8px; border-radius: 10px; font-size: 11px; z-index: 10; }
        .user-header { display: flex; align-items: center; justify-content: center; padding: 10px; background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,140,0,0.2); z-index: 10; }
        #user-name { font-weight: 800; color: var(--main-orange); font-size: 12px; letter-spacing: 1px; }
        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; }
        .rank-name { color: var(--main-orange); font-weight: 900; font-size: 18px; text-transform: uppercase; }
        .progress-container { width: 200px; height: 6px; background: #222; border-radius: 10px; margin: 5px 0 20px; overflow: hidden; border: 1px solid #333; }
        .progress-bar { height: 100%; background: var(--main-orange); width: 0%; transition: width 0.4s; box-shadow: 0 0 15px var(--main-orange); }
        .score-box { background: rgba(255,140,0,0.05); border: 1px solid rgba(255,140,0,0.2); border-radius: 20px; padding: 15px 40px; margin-bottom: 15px; }
        .score { font-size: 44px; font-weight: 900; color: var(--main-orange); }
        .click-area { font-size: 130px; cursor: pointer; transition: 0.1s; margin: 15px 0; }
        .click-area.overdrive { filter: drop-shadow(0 0 40px var(--heat-blue)) hue-rotate(180deg); animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }
        .gamble-btn { background: #ff4500; color: #fff; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 900; font-size: 12px; margin-bottom: 10px; }
        .btn-box { padding: 20px; display: flex; gap: 10px; z-index: 20; }
        .btn { flex: 1; background: var(--main-orange); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: 900; text-transform: uppercase; }
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding-top: 40px; }
        .m-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .m-btn { background: #222; color: #ff8c00; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; }
        .m-btn.active { background: var(--main-orange); color: #000; }
        .shop-item { background: #111; margin: 10px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; border-left: 4px solid var(--main-orange); }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div class="quest-banner" id="quest">Квест: Добыть 5000 т. (0/5000)</div>
    <div class="user-header"><div id="user-name">ГЕНЕРАЛЬНЫЙ ДИРЕКТОР</div></div>

    <div class="main-screen">
        <div class="rank-name" id="rank">Разнорабочий</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        <button class="gamble-btn" onclick="gamble()">🎲 РИСКНУТЬ (10%)</button>
        <div class="score-box">
            <div class="score" id="score">0</div>
            <div style="font-size: 10px; opacity: 0.5;">ТОНН СТАЛИ</div>
        </div>
        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color:var(--main-orange); font-weight:800; font-size:12px;">КЛИК: +1 | АВТО: 0/СЕК</div>
    </div>

    <div class="btn-box">
        <button class="btn" onclick="openShop()">🏢 УЛУЧШИТЬ ЗАВОД</button>
    </div>

    <div id="shop-modal">
        <h2 style="color:var(--main-orange)">РЫНОК ОБОРУДОВАНИЯ</h2>
        <div class="m-row">
            <button class="m-btn active" id="m1" onclick="setM(1)">X1</button>
            <button class="m-btn" id="m10" onclick="setM(10)">X10</button>
            <button class="m-btn" id="mMax" onclick="setM('MAX')">MAX</button>
        </div>
        <div id="shop-list"></div>
        <p onclick="closeShop()" style="color:var(--main-orange); margin-top:30px; font-weight:900;">← ВЕРНУТЬСЯ В ЦЕХ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Данные (Добавляем количество покупок)
        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;
        let owned = JSON.parse(localStorage.getItem('steel_owned')) || { click: 0, auto: 0, furnace: 0, port: 0 };
        
        let buyM = 1;
        let isOverdrive = false;
        let clickTimes = [];

        const upgrades = [
            { id: 'click', name: 'МОЛОТ V2', basePrice: 50, power: 1, type: 'click' },
            { id: 'auto', name: 'АВТО-ЛИНИЯ', basePrice: 200, power: 1, type: 'auto' },
            { id: 'furnace', name: 'ПЕЧЬ МАРТЕН', basePrice: 2000, power: 10, type: 'auto' },
            { id: 'port', name: 'ПОРТ АЗОВА', basePrice: 10000, power: 50, type: 'auto' }
        ];

        // Функция расчета цены с удорожанием (1.15x за каждый уровень)
        function getPrice(id, count) {
            let up = upgrades.find(u => u.id === id);
            let currentOwned = owned[id];
            let total = 0;
            for(let i = 0; i < count; i++) {
                total += up.basePrice * Math.pow(1.15, currentOwned + i);
            }
            return Math.floor(total);
        }

        // Расчет MAX количества
        function getMaxBuy(id) {
            let up = upgrades.find(u => u.id === id);
            let currentOwned = owned[id];
            let count = 0;
            let tempScore = score;
            while(true) {
                let nextPrice = up.basePrice * Math.pow(1.15, currentOwned + count);
                if(tempScore >= nextPrice) {
                    tempScore -= nextPrice;
                    count++;
                } else break;
            }
            return count || 1;
        }

        function update() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('stats').innerText = `КЛИК: +${isOverdrive ? clickPower*2 : clickPower} | АВТО: ${autoPower}/СЕК`;
            
            const ranks = [500, 5000, 50000, 500000, 5000000];
            const names = ["Разнорабочий", "Мастер", "Начальник", "Директор", "Магнат"];
            let idx = ranks.findIndex(r => score < r); if(idx === -1) idx = 4;
            document.getElementById('rank').innerText = names[idx];
            let prev = idx === 0 ? 0 : ranks[idx-1];
            document.getElementById('progressBar').style.width = Math.min(((score - prev) / (ranks[idx] - prev)) * 100, 100) + "%";

            localStorage.setItem('steel_score', score);
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
            localStorage.setItem('steel_owned', JSON.stringify(owned));
            if (document.getElementById('shop-modal').style.display === 'block') renderShop();
        }

        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            const now = Date.now();
            clickTimes.push(now);
            clickTimes = clickTimes.filter(t => now - t < 1000);
            isOverdrive = clickTimes.length > 7;
            if(isOverdrive) document.getElementById('clickBtn').classList.add('overdrive');
            else document.getElementById('clickBtn').classList.remove('overdrive');

            let gain = isOverdrive ? clickPower * 2 : clickPower;
            score += gain;
            tg.HapticFeedback.impactOccurred(isOverdrive ? 'heavy' : 'medium');
            update();
        });

        function setM(m) { buyM = m; renderShop(); }
        function openShop() { document.getElementById('shop-modal').style.display='block'; renderShop(); }
        function closeShop() { document.getElementById('shop-modal').style.display='none'; }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            upgrades.forEach(up => {
                let count = buyM === 'MAX' ? getMaxBuy(up.id) : buyM;
                let cost = getPrice(up.id, count);
                list.innerHTML += `<div class="shop-item">
                    <div style="text-align:left"><b>${up.name}</b> (ур. ${owned[up.id]})<br><small>+${up.power * count} к добыче</small></div>
                    <button class="m-btn" ${score < cost ? 'disabled' : ''} onclick="buy('${up.id}', ${count}, ${cost})">${cost.toLocaleString()} Т.</button>
                </div>`;
            });
        }

        function buy(id, count, cost) {
            if (score >= cost) {
                score -= cost;
                owned[id] += count;
                let up = upgrades.find(u => u.id === id);
                if (id === 'click') clickPower += (up.power * count);
                else autoPower += (up.power * count);
                tg.HapticFeedback.notificationOccurred('success');
                update();
            }
        }

        function gamble() {
            let bet = Math.floor(score * 0.1);
            if (score < 100) return;
            if (Math.random() < 0.4) { score += bet * 2; tg.showAlert("УСПЕХ! +"+bet*2); }
            else { score -= bet; tg.showAlert("Провал..."); }
            update();
        }

        setInterval(() => { if (autoPower > 0) { score += autoPower; update(); } }, 1000);
        update();
    </script>
</body>
</html>
