<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .score-box { border: 2px solid #ff8c00; border-radius: 20px; padding: 15px 40px; background: rgba(255,140,0,0.1); box-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .score { font-size: 42px; font-weight: bold; color: #ff8c00; }
        .click-area { font-size: 140px; cursor: pointer; transition: transform 0.05s; text-shadow: 0 0 30px rgba(255, 140, 0, 0.5); margin: 20px 0; }
        .click-area:active { transform: scale(0.9); }
        
        /* Прогресс и ранги */
        .rank-box { margin-bottom: 10px; }
        .rank-name { color: #ff8c00; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .progress-container { width: 200px; height: 8px; background: #333; border-radius: 4px; margin: 5px auto; overflow: hidden; }
        .progress-bar { height: 100%; background: #ff8c00; width: 0%; transition: width 0.3s; }

        .shop-btn { background: #ff8c00; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 18px; margin: 20px; cursor: pointer; width: 80%; align-self: center; }
        
        /* Золотой бонус */
        #bonus-item { display: none; position: absolute; font-size: 50px; cursor: pointer; z-index: 5; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; overflow-y: auto; padding-bottom: 40px; }
        .shop-item { background: #1a1a1a; border: 1px solid #333; margin: 10px 20px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #ff8c00; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; color: #000; min-width: 80px; }
        .close-shop { margin-top: 20px; color: #ff8c00; font-weight: bold; padding: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="bonus-item" onclick="collectBonus()">💰</div>

    <div class="main-screen">
        <div class="rank-box">
            <div class="rank-name" id="rank">Разнорабочий</div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="score-box">
            <div class="score"><span id="score">0</span> т.</div>
            <div style="font-size: 12px; color: #aaa;">СТАЛЬ В НАЛИЧИИ</div>
        </div>

        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color: #ff8c00; font-weight: bold; font-size: 14px;">Клик: +1 | Авто: 0/сек</div>
    </div>

    <button class="shop-btn" onclick="openShop()">МАГАЗИН УЛУЧШЕНИЙ</button>

    <div id="shop-modal">
        <h2 style="color: #ff8c00; margin-top: 40px;">ЗАВОДСКОЙ МАГАЗИН</h2>
        
        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Мощный молот</div>
                <div style="font-size: 11px; color: #aaa;">+1 к клику</div>
            </div>
            <button class="buy-btn" id="btn-click" onclick="buyUpgrade('click')">50 т.</button>
        </div>

        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Авто-цех</div>
                <div style="font-size: 11px; color: #aaa;">+1 т. в сек.</div>
            </div>
            <button class="buy-btn" id="btn-auto" onclick="buyUpgrade('auto')">200 т.</button>
        </div>

        <div class="shop-item">
            <div style="text-align: left;">
                <div style="font-weight: bold;">Мартеновская печь</div>
                <div style="font-size: 11px; color: #aaa;">+10 т. в сек.</div>
            </div>
            <button class="buy-btn" id="btn-furnace" onclick="buyUpgrade('furnace')">2000 т.</button>
        </div>

        <div class="close-shop" onclick="closeShop()">ВЕРНУТЬСЯ К ДОБЫЧЕ</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;

        const ranks = [
            { name: "Разнорабочий", goal: 500 },
            { name: "Мастер смены", goal: 2000 },
            { name: "Начальник цеха", goal: 10000 },
            { name: "Директор завода", goal: 50000 },
            { name: "Хозяин Азовстали", goal: 1000000 }
        ];

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('stats').innerText = `Клик: +${clickPower} | Авто: ${autoPower}/сек`;
            
            // Обновление ранга
            let currentRank = ranks.find(r => score < r.goal) || ranks[ranks.length-1];
            let prevGoal = ranks[ranks.indexOf(currentRank)-1]?.goal || 0;
            let prog = ((score - prevGoal) / (currentRank.goal - prevGoal)) * 100;
            
            document.getElementById('rank').innerText = currentRank.name;
            document.getElementById('progressBar').style.width = Math.min(prog, 100) + "%";

            localStorage.setItem('steel_score', score);
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
        }

        document.getElementById('clickBtn').addEventListener('click', () => {
            score += clickPower;
            updateDisplay();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        });

        setInterval(() => {
            if (autoPower > 0) {
                score += autoPower;
                updateDisplay();
            }
        }, 1000);

        // Золотой бонус
        function spawnBonus() {
            const bonus = document.getElementById('bonus-item');
            bonus.style.left = Math.random() * 80 + 10 + "%";
            bonus.style.top = Math.random() * 60 + 20 + "%";
            bonus.style.display = 'block';
            setTimeout(() => { bonus.style.display = 'none'; }, 4000);
        }
        setInterval(spawnBonus, Math.random() * 30000 + 30000);

        function collectBonus() {
            let reward = clickPower * 100;
            score += reward;
            document.getElementById('bonus-item').style.display = 'none';
            tg.HapticFeedback.notificationOccurred('success');
            alert("Бонус Азова! Получено " + reward + " тонн стали!");
            updateDisplay();
        }

        function openShop() { document.getElementById('shop-modal').style.display = 'block'; }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }

        function buyUpgrade(type) {
            if (type === 'click' && score >= 50) { score -= 50; clickPower += 1; }
            else if (type === 'auto' && score >= 200) { score -= 200; autoPower += 1; }
            else if (type === 'furnace' && score >= 2000) { score -= 2000; autoPower += 10; }
            else { alert("Недостаточно стали!"); return; }
            
            tg.HapticFeedback.notificationOccurred('success');
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
