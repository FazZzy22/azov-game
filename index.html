<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Azov Steel Tycoon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: rgba(255, 140, 0, 0.2); border-radius: 50%; animation: particleFall 5s linear infinite; }
        @keyframes particleFall { 0% { transform: translateY(-10px); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }

        .user-header { display: flex; align-items: center; justify-content: center; padding: 10px; background: rgba(255,140,0,0.03); border-bottom: 1px solid #222; margin-bottom: 10px; z-index: 10; position: relative; }
        #user-photo { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ff8c00; margin-right: 10px; display: none; object-fit: cover; }
        #user-name { font-weight: bold; color: #ff8c00; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; }
        .rank-box { margin-bottom: 15px; z-index: 10; }
        .rank-name { color: #ff8c00; font-weight: bold; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .progress-container { width: 220px; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin: 0 auto; border: 1px solid #333; position: relative; }
        .progress-bar { height: 100%; background: #ff8c00; width: 0%; transition: width 0.5s ease-out; box-shadow: 0 0 15px #ff8c00; }

        .score-box { border: 2px solid #ff8c00; border-radius: 20px; padding: 15px 40px; background: rgba(255,140,0,0.1); margin-bottom: 20px; box-shadow: 0 0 25px rgba(255, 140, 0, 0.2); }
        .score { font-size: 42px; font-weight: bold; color: #ff8c00; text-shadow: 0 0 15px #ff8c00; }
        
        .click-area { font-size: 130px; cursor: pointer; transition: transform 0.05s; margin: 20px 0; animation: anchorPulse 2s ease-in-out infinite; }
        @keyframes anchorPulse { 0%, 100% { text-shadow: 0 0 10px rgba(255, 140, 0, 0.2); } 50% { text-shadow: 0 0 40px rgba(255, 140, 0, 0.6); } }
        .click-area:active { transform: scale(0.9) rotate(5deg); animation: none; }

        .floating-text { position: absolute; color: #ff8c00; font-weight: bold; font-size: 24px; pointer-events: none; animation: floatAway 1.5s ease-out forwards; z-index: 15; }
        @keyframes floatAway { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }

        .btn-box { padding: 20px; width: 100%; box-sizing: border-box; display: flex; gap: 10px; z-index: 20; }
        .btn { flex: 1; background: #ff8c00; color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .share-btn { background: #222; color: #ff8c00; border: 1px solid #ff8c00; }

        /* Магазин V3 */
        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; overflow-y: auto; }
        .multiplier-btn { background: #222; color: #ff8c00; border: 1px solid #ff8c00; padding: 10px 20px; border-radius: 10px; margin: 20px 0; font-weight: bold; cursor: pointer; }
        .multiplier-btn.active { background: #ff8c00; color: #000; }
        .shop-item { background: #111; border: 1px solid #333; margin: 10px 20px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #ff8c00; }
        .shop-info { text-align: left; }
        .buy-btn { background: #ff8c00; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; color: #000; min-width: 90px; }
        .buy-btn:disabled { background: #333; color: #aaa; }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <div class="user-header">
        <img id="user-photo" src="" alt="">
        <div id="user-name">СТАЛЬНОЙ МАГНАТ</div>
    </div>

    <div class="main-screen">
        <div class="rank-box">
            <div class="rank-name" id="rank">Разнорабочий</div>
            <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        <div class="score-box">
            <div class="score"><span id="score">0</span> т.</div>
            <div style="font-size: 11px; color: #aaa;">СТАЛЬ В НАЛИЧИИ</div>
        </div>
        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color:#ff8c00; font-weight:bold;">Клик: +1 | Авто: 0/сек</div>
    </div>

    <div class="btn-box">
        <button class="btn share-btn" onclick="shareResult()">📢 Поделиться</button>
        <button class="btn" onclick="openShop()">🏢 МАГАЗИН</button>
    </div>

    <div id="shop-modal">
        <h2 style="color: #ff8c00; margin-top: 40px;">ЗАВОДСКОЙ МАГАЗИН</h2>
        
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="multiplier-btn active" id="m1" onclick="setMultiplier(1)">x1</button>
            <button class="multiplier-btn" id="m10" onclick="setMultiplier(10)">x10</button>
            <button class="multiplier-btn" id="mMax" onclick="setMultiplier('MAX')">MAX</button>
        </div>

        <div id="shop-list">
            </div>

        <div style="padding: 30px; color: #ff8c00; font-weight: bold; cursor: pointer;" onclick="closeShop()">← ВЕРНУТЬСЯ В ЦЕХ</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;
        let buyMultiplier = 1;

        const upgrades = [
            { id: 'click', name: 'Молот V2', desc: '+1 к клику', price: 50, type: 'click' },
            { id: 'auto', name: 'Авто-цех', desc: '+1 т./сек', price: 200, type: 'auto' },
            { id: 'furnace', name: 'Печь "Мартен"', desc: '+10 т./сек', price: 2000, type: 'auto' },
            { id: 'port', name: 'Порт Азова', desc: '+50 т./сек', price: 10000, type: 'auto' }
        ];

        const ranks = [
            { name: "Разнорабочий", goal: 500 },
            { name: "Мастер смены", goal: 2000 },
            { name: "Начальник цеха", goal: 10000 },
            { name: "Директор завода", goal: 50000 },
            { name: "Хозяин Азовстали", goal: 1000000 }
        ];

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('stats').innerText = `Клик: +${clickPower} | Авто: ${autoPower}/сек`;
            
            let currentRankIndex = ranks.findIndex(r => score < r.goal);
            if (currentRankIndex === -1) currentRankIndex = ranks.length - 1;
            let currentRank = ranks[currentRankIndex];
            let prevGoal = ranks[currentRankIndex - 1]?.goal || 0;
            let prog = ((score - prevGoal) / (currentRank.goal - prevGoal)) * 100;
            document.getElementById('rank').innerText = currentRank.name;
            document.getElementById('progressBar').style.width = Math.min(prog, 100) + "%";

            if (document.getElementById('shop-modal').style.display === 'block') renderShop();

            localStorage.setItem('steel_score', score);
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
        }

        function setMultiplier(m) {
            buyMultiplier = m;
            document.querySelectorAll('.multiplier-btn').forEach(btn => btn.classList.remove('active'));
            if (m === 1) document.getElementById('m1').classList.add('active');
            if (m === 10) document.getElementById('m10').classList.add('active');
            if (m === 'MAX') document.getElementById('mMax').classList.add('active');
            renderShop();
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            upgrades.forEach(up => {
                let count = buyMultiplier;
                if (buyMultiplier === 'MAX') {
                    count = Math.floor(score / up.price);
                    if (count < 1) count = 1;
                }
                let totalPrice = up.price * count;
                let canBuy = score >= totalPrice;

                list.innerHTML += `
                    <div class="shop-item">
                        <div class="shop-info"><b>${up.name}</b> (x${count})<br><small>${up.desc}</small></div>
                        <button class="buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyUpgrade('${up.id}', ${count}, ${totalPrice})">
                            ${totalPrice} т.
                        </button>
                    </div>`;
            });
        }

        function buyUpgrade(id, count, price) {
            if (score >= price) {
                score -= price;
                let up = upgrades.find(u => u.id === id);
                if (id === 'click') clickPower += count;
                else {
                    let powerAdd = (id === 'auto' ? 1 : id === 'furnace' ? 10 : 50);
                    autoPower += (powerAdd * count);
                }
                tg.HapticFeedback.notificationOccurred('success');
                updateDisplay();
            }
        }

        // Клик и частицы
        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            score += clickPower;
            const container = document.querySelector('.main-screen');
            const floatingText = document.createElement('div');
            floatingText.className = 'floating-text';
            floatingText.innerText = `+${clickPower}`;
            let x = e.touches[0].clientX - container.offsetLeft - 20;
            let y = e.touches[0].clientY - container.offsetTop - 30;
            floatingText.style.left = x + 'px';
            floatingText.style.top = y + 'px';
            container.appendChild(floatingText);
            setTimeout(() => { floatingText.remove(); }, 1500);
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium');
        });

        function createParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 5 + 2 + 'px'; p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }

        setInterval(() => { if (autoPower > 0) { score += autoPower; updateDisplay(); } }, 1000);
        function openShop() { document.getElementById('shop-modal').style.display = 'block'; renderShop(); }
        function closeShop() { document.getElementById('shop-modal').style.display = 'none'; }
        createParticles();
        updateDisplay();

        // Данные юзера
        try {
            const u = tg.initDataUnsafe?.user;
            if (u) {
                document.getElementById('user-name').innerText = (u.first_name || u.username).toUpperCase();
                if (u.photo_url) { const img = document.getElementById('user-photo'); img.src = u.photo_url; img.style.display = 'block'; }
            }
        } catch (e) {}
    </script>
</body>
</html>
