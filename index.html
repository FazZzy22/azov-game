<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Steel Empire: Azov Forge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-orange: #ff8c00; --energy-blue: #00f2ff; }
        
        body { 
            background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; transition: background 1s ease;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden; 
        }

        /* Динамические фоны для уровней завода */
        .bg-level-0 { background: radial-gradient(circle, #1a0f00 0%, #000 100%); }
        .bg-level-1 { background: linear-gradient(180deg, #2b1b00 0%, #000 100%); }
        .bg-level-2 { background: radial-gradient(circle at top, #3d2600 0%, #000 100%); }
        .bg-level-3 { background: inner-shadow, url('https://w.wallhaven.cc/full/ox/wallhaven-oxp3p9.jpg') center/cover; } /* Пример */

        #particles-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; background: var(--main-orange); border-radius: 50%; animation: particleFall 4s linear infinite; opacity: 0.3; }
        @keyframes particleFall { 0% { transform: translateY(-10px); opacity: 0; } 100% { transform: translateY(100vh); opacity: 0; } }

        .user-header { display: flex; align-items: center; justify-content: center; padding: 10px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,140,0,0.2); z-index: 10; }
        #user-name { font-weight: 800; color: var(--main-orange); font-size: 12px; text-transform: uppercase; }

        .main-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 5; }
        
        /* Энергия */
        .energy-box { margin-bottom: 10px; z-index: 10; }
        .energy-text { font-size: 14px; font-weight: bold; color: var(--energy-blue); text-shadow: 0 0 10px var(--energy-blue); }
        .energy-container { width: 180px; height: 6px; background: #111; border-radius: 10px; border: 1px solid #00f2ff55; overflow: hidden; }
        .energy-bar { height: 100%; background: var(--energy-blue); width: 100%; transition: width 0.2s; box-shadow: 0 0 10px var(--energy-blue); }

        .rank-name { color: var(--main-orange); font-weight: 900; font-size: 18px; text-transform: uppercase; margin-top: 15px; }
        .progress-container { width: 220px; height: 4px; background: #222; border-radius: 10px; margin: 5px 0 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--main-orange); width: 0%; transition: width 0.4s; }

        .score-box { background: rgba(0,0,0,0.6); border: 1px solid var(--main-orange); border-radius: 20px; padding: 15px 45px; }
        .score { font-size: 46px; font-weight: 900; color: var(--main-orange); }

        .click-area { font-size: 130px; cursor: pointer; transition: 0.1s; margin: 20px 0; filter: drop-shadow(0 0 10px rgba(255,140,0,0.2)); }
        .click-area:active { transform: scale(0.9); }
        .click-area.no-energy { filter: grayscale(1) opacity(0.5); cursor: not-allowed; }

        .btn-box { padding: 20px; display: flex; gap: 10px; z-index: 20; background: rgba(0,0,0,0.8); }
        .btn { flex: 1; background: var(--main-orange); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: 900; text-transform: uppercase; }

        #shop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; overflow-y: auto; padding-top: 40px; }
        .shop-item { background: #111; margin: 10px 20px; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .m-btn { background: #222; color: var(--main-orange); border: 1px solid #444; padding: 10px; border-radius: 10px; margin: 5px; }
        .m-btn.active { background: var(--main-orange); color: #000; }
    </style>
</head>
<body class="bg-level-0" id="game-body">
    <div id="particles-container"></div>
    
    <div class="user-header"><div id="user-name">ГЕНЕРАЛЬНЫЙ ДИРЕКТОР</div></div>

    <div class="main-screen">
        <div class="energy-box">
            <div class="energy-text">⚡ <span id="energy-val">1000</span> / 1000</div>
            <div class="energy-container"><div class="energy-bar" id="energyBar"></div></div>
        </div>

        <div class="rank-name" id="rank">Разнорабочий</div>
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>

        <div class="score-box">
            <div class="score" id="score">0</div>
            <div style="font-size: 10px; opacity: 0.6; letter-spacing: 2px;">TONS OF STEEL</div>
        </div>

        <div class="click-area" id="clickBtn">⚓</div>
        <div id="stats" style="color:var(--main-orange); font-weight:800; font-size:12px;">КЛИК: +1 | АВТО: 0/СЕК</div>
    </div>

    <div class="btn-box">
        <button class="btn" onclick="openShop()">🏢 МАГАЗИН И УРОВНИ</button>
    </div>

    <div id="shop-modal">
        <h2 style="color:var(--main-orange)">МОДЕРНИЗАЦИЯ КУЗНИЦЫ</h2>
        <div style="margin-bottom: 20px;">
            <button class="m-btn active" id="m1" onclick="setM(1)">X1</button>
            <button class="m-btn" id="m10" onclick="setM(10)">X10</button>
            <button class="m-btn" id="mMax" onclick="setM('MAX')">MAX</button>
        </div>
        <div id="shop-list"></div>
        <p onclick="closeShop()" style="color:var(--main-orange); margin-top:30px; font-weight:900; cursor:pointer;">← ВЕРНУТЬСЯ К РАБОТЕ</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let score = parseFloat(localStorage.getItem('steel_score')) || 0;
        let clickPower = parseInt(localStorage.getItem('click_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('auto_power')) || 0;
        let energy = parseFloat(localStorage.getItem('steel_energy')) || 1000;
        let owned = JSON.parse(localStorage.getItem('steel_owned')) || { click: 0, auto: 0, furnace: 0, port: 0 };
        
        let maxEnergy = 1000;
        let buyM = 1;

        const upgrades = [
            { id: 'click', name: 'МОЛОТ V2', basePrice: 50, power: 1 },
            { id: 'auto', name: 'АВТО-ЛИНИЯ', basePrice: 200, power: 1 },
            { id: 'furnace', name: 'ПЕЧЬ МАРТЕН', basePrice: 2000, power: 10 },
            { id: 'port', name: 'ПОРТ АЗОВА', basePrice: 10000, power: 50 }
        ];

        function getPrice(id, count) {
            let up = upgrades.find(u => u.id === id);
            let total = 0;
            for(let i=0; i<count; i++) total += up.basePrice * Math.pow(1.15, owned[id] + i);
            return Math.floor(total);
        }

        function update() {
            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('energy-val').innerText = Math.floor(energy);
            document.getElementById('energyBar').style.width = (energy / maxEnergy * 100) + "%";
            document.getElementById('stats').innerText = `КЛИК: +${clickPower} | АВТО: ${autoPower}/СЕК`;

            const ranks = [
                { name: "Разнорабочий", goal: 1000, class: "bg-level-0" },
                { name: "Мастер", goal: 10000, class: "bg-level-1" },
                { name: "Управляющий", goal: 100000, class: "bg-level-2" },
                { name: "Гендиректор", goal: 1000000, class: "bg-level-3" },
                { name: "Стальной Монарх", goal: 999999999, class: "bg-level-3" }
            ];

            let idx = ranks.findIndex(r => score < r.goal);
            if(idx === -1) idx = ranks.length - 1;
            
            let cur = ranks[idx];
            document.getElementById('rank').innerText = cur.name;
            document.body.className = cur.class;

            let prev = idx === 0 ? 0 : ranks[idx-1].goal;
            document.getElementById('progressBar').style.width = Math.min(((score - prev) / (cur.goal - prev)) * 100, 100) + "%";

            localStorage.setItem('steel_score', score);
            localStorage.setItem('steel_energy', energy);
            localStorage.setItem('steel_owned', JSON.stringify(owned));
            localStorage.setItem('click_power', clickPower);
            localStorage.setItem('auto_power', autoPower);
        }

        // Клик с расходом энергии
        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            if (energy >= 1) {
                energy -= 1;
                score += clickPower;
                tg.HapticFeedback.impactOccurred('medium');
                update();
            } else {
                document.getElementById('clickBtn').classList.add('no-energy');
                setTimeout(() => document.getElementById('clickBtn').classList.remove('no-energy'), 200);
                tg.HapticFeedback.notificationOccurred('error');
            }
        });

        // Регенерация энергии (1 в секунду)
        setInterval(() => {
            if (energy < maxEnergy) {
                energy = Math.min(maxEnergy, energy + 1);
                update();
            }
            if (autoPower > 0) {
                score += autoPower;
                update();
            }
        }, 1000);

        function openShop() { document.getElementById('shop-modal').style.display='block'; renderShop(); }
        function closeShop() { document.getElementById('shop-modal').style.display='none'; }
        function setM(m) { buyM = m; renderShop(); }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            upgrades.forEach(up => {
                let count = buyM;
                if(buyM === 'MAX') {
                    count = 0; let tempScore = score;
                    while(tempScore >= getPrice(up.id, 1 + count)) {
                        tempScore -= getPrice(up.id, 1 + count);
                        count++;
                    }
                    if(count === 0) count = 1;
                }
                let cost = getPrice(up.id, count);
                list.innerHTML += `<div class="shop-item">
                    <div style="text-align:left"><b>${up.name}</b> (ур. ${owned[up.id]})</div>
                    <button class="m-btn" ${score < cost ? 'disabled' : ''} onclick="buy('${up.id}', ${count}, ${cost})">${cost.toLocaleString()} Т.</button>
                </div>`;
            });
        }

        function buy(id, count, cost) {
            if (score >= cost) {
                score -= cost;
                owned[id] += count;
                let up = upgrades.find(u => u.id === id);
                if (id === 'click') clickPower += (up.power * count);
                else autoPower += (up.power * count);
                tg.HapticFeedback.notificationOccurred('success');
                update();
                renderShop();
            }
        }

        update();
        // Частицы
        for(let i=0; i<15; i++){
            let p = document.createElement('div'); p.className='particle';
            p.style.left=Math.random()*100+'vw'; p.style.animationDelay=Math.random()*4+'s';
            document.getElementById('particles-container').appendChild(p);
        }
    </script>
</body>
</html>
